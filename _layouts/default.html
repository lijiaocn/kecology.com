<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body style="{% if page.backgroud-color %}background-color: {{page.backgroud-color}};{% endif %}">

    {% if page.display != 'fullscreen' %}
      {%- include header.html -%}
    {% endif %}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {% if page.display != 'fullscreen' %}
      {%- include footer.html -%}
    {% endif %}

  </body>

</html>
